<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Empréstimos — Admin</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
</head>
<body>
    <div class="admin-layout">
        <!-- SIDEBAR -->
        <aside class="sidebar">
            <div class="sidebar-logo"><i class="fas fa-boxes-stacked"></i> <span>Patrimônios</span></div>
            <nav class="sidebar-nav">
                <a href="items.html">
                    <span class="icon"><i class="fas fa-box-archive"></i></span> Inventário
                </a>
                <a href="loans.html" class="active">
                    <span class="icon"><i class="fas fa-handshake"></i></span> Retiradas
                </a>
                <a href="people.html">
                    <span class="icon"><i class="fas fa-id-card"></i></span> Titulares NIF
                </a>
                <a href="../index.html">
                    <span class="icon"><i class="fas fa-globe"></i></span> Portal Público
                </a>
            </nav>
            <div class="sidebar-footer">
                <button onclick="logout()"><i class="fas fa-right-from-bracket"></i> Sair</button>
            </div>
        </aside>

        <!-- MAIN -->
        <div class="admin-main">
            <!-- Mobile topbar -->
            <div class="mobile-topbar" id="mobile-topbar" style="display:none">
                <div class="mobile-logo"><i class="fas fa-boxes-stacked"></i> Patrimônios</div>
                <button class="sidebar-hamburger" id="hamburger-btn" onclick="toggleSidebar()" aria-label="Menu">
                    <i class="fas fa-bars" id="hamburger-icon"></i>
                </button>
            </div>

            <div class="admin-topbar">
                <h1>Histórico de Retiradas</h1>
                <span class="user-tag"><i class="fas fa-user-shield"></i> Administrador</span>
            </div>

            <div class="admin-content">
                <!-- Stats -->
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-icon"><i class="fas fa-file-lines"></i></div>
                        <div class="stat-label">Total de Retiradas</div>
                        <div class="stat-value" id="stat-total">—</div>
                    </div>
                </div>

                <!-- Filters -->
                <div class="section-bar">
                    <span class="section-title">Registros</span>
                    <div class="filter-bar">
                        <div class="form-group">
                            <label>Nome do Titular</label>
                            <input type="text" id="filter-name" placeholder="Buscar por nome...">
                        </div>
                        <div class="form-group">
                            <label>Item</label>
                            <input type="text" id="filter-item" placeholder="Nome do item...">
                        </div>
                        <div class="form-group">
                            <label>&nbsp;</label>
                            <button class="btn btn-primary btn-sm" onclick="loadLoans()"><i class="fas fa-search"></i> Filtrar</button>
                        </div>
                    </div>
                </div>

                <!-- Table -->
                <div class="table-wrapper">
                    <table>
                        <thead>
                            <tr>
                                <th>Item</th>
                                <th>Titular</th>
                                <th>NIF</th>
                                <th>Data de Retirada</th>
                                <th>Quantidade</th>
                            </tr>
                        </thead>
                        <tbody id="loans-list">
                            <tr><td colspan="5" class="empty-state">Carregando...</td></tr>
                        </tbody>
                    </table>
                </div>
                <div id="loans-pagination" class="pagination"></div>
            </div>
        </div>
    </div>

    <!-- Sidebar overlay for mobile -->
    <div class="sidebar-overlay" id="sidebar-overlay" onclick="closeSidebar()"></div>

    <div id="toast" class="toast"></div>
    <script src="../js/config.js"></script>
    <script src="../js/admin-loans.js"></script>
    <script src="../js/sidebar.js"></script>
</body>
</html>
