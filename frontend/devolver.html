<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Devolver Item — Controle de Patrimônios</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
</head>
<body>
    <header class="public-header">
        <div class="logo"><i class="fas fa-boxes-stacked"></i> Controle de Patrimônios</div>
        <nav>
            <a href="index.html">Início</a>
            <a href="retirar.html">Retirar</a>
            <a href="devolver.html" class="active">Devolver</a>
            <a href="login.html">Área Admin</a>
        </nav>
    </header>

    <div class="form-page" style="max-width:720px;">
        <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Voltar ao início</a>

        <div class="card">
            <div style="margin-bottom:24px;">
                <h2 style="font-size:1.4rem; font-weight:800; margin-bottom:6px;"><i class="fas fa-download" style="margin-right:8px; color:var(--success)"></i> Devolver Item</h2>
                <p style="color:var(--text-muted); font-size:.9rem;">Busque seus empréstimos em aberto pelo seu NIF para registrar uma devolução.</p>
            </div>

            <div style="display:flex; gap:10px; align-items:flex-end;">
                <div class="form-group" style="flex:1; margin-bottom:0;">
                    <label for="search-nif">Seu NIF</label>
                    <input type="text" id="search-nif" placeholder="9 dígitos numéricos" maxlength="9" pattern="\d{9}">
                </div>
                <button class="btn btn-primary" onclick="searchLoans()" id="search-btn"><i class="fas fa-search"></i> Buscar</button>
            </div>
        </div>

        <div id="results-area" style="margin-top:24px;"></div>
    </div>

    <!-- Modal de Devolução -->
    <div id="return-modal" class="modal-overlay" style="display:none;">
        <div class="modal-box">
            <h3 class="modal-title"><i class="fas fa-rotate-left" style="margin-right:10px;"></i> Confirmar Devolução</h3>
            <p id="modal-info" style="color:var(--text-muted); font-size:.9rem; margin-bottom:20px;"></p>
            <div class="form-group">
                <label for="modal-quantity">Quantidade a devolver</label>
                <input type="number" id="modal-quantity" min="1">
            </div>
            <div class="modal-actions">
                <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
                <button class="btn btn-success" id="confirm-btn" onclick="confirmReturn()"><i class="fas fa-check"></i> Confirmar</button>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>
    <script src="js/config.js"></script>
    <script src="js/return.js"></script>
</body>
</html>
