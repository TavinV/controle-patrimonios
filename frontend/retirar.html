<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retirar Item — Controle de Patrimônios</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
</head>
<body class="kiosk-body">

    <!-- Fixed top bar for kiosk -->
    <header class="kiosk-header">
        <div class="logo"><i class="fas fa-boxes-stacked"></i> Controle de Patrimônios</div>
        <a href="index.html" class="kiosk-home-btn"><i class="fas fa-house"></i></a>
    </header>

    <main class="kiosk-main">

        <!-- STEP INDICATOR -->
        <div class="kiosk-steps" id="step-indicator">
            <div class="kstep active" id="kstep-1"><span class="kstep-num">1</span><span class="kstep-label">NIF</span></div>
            <div class="kstep-line"></div>
            <div class="kstep" id="kstep-2"><span class="kstep-num">2</span><span class="kstep-label">Item</span></div>
            <div class="kstep-line"></div>
            <div class="kstep" id="kstep-3"><span class="kstep-num">3</span><span class="kstep-label">Confirmar</span></div>
        </div>

        <!-- STEP 1: NIF -->
        <section class="kiosk-step-panel nif-step-panel" id="step-1">
            <div class="nif-step-layout">

                <!-- Coluna esquerda: info + display + feedback -->
                <div class="nif-info-col">
                    <div style="text-align:center;">
                        <h2 class="kiosk-title">Introduza o seu NIF</h2>
                        <p class="kiosk-subtitle" style="margin-top:6px;">Toque nos números ou use o teclado</p>
                    </div>

                    <div class="nif-display" id="nif-display">
                        <span class="nif-text nif-text--empty" id="nif-text">_ _ _</span>
                    </div>

                    <div id="nif-person-preview" class="kiosk-person-preview" style="display:none">
                        <i class="fas fa-circle-check" style="color:var(--success)"></i>
                        <span id="nif-person-name"></span>
                    </div>
                    <div id="nif-error" class="kiosk-error-msg" style="display:none"></div>

                    <button class="kiosk-btn-primary" id="nif-next-btn" style="display:none" onclick="goToStep2()">
                        Continuar <i class="fas fa-arrow-right"></i>
                    </button>
                </div>

                <!-- Coluna direita: numpad -->
                <div class="numpad">
                    <button class="numpad-key" onclick="nifPress('1')">1</button>
                    <button class="numpad-key" onclick="nifPress('2')">2</button>
                    <button class="numpad-key" onclick="nifPress('3')">3</button>
                    <button class="numpad-key" onclick="nifPress('4')">4</button>
                    <button class="numpad-key" onclick="nifPress('5')">5</button>
                    <button class="numpad-key" onclick="nifPress('6')">6</button>
                    <button class="numpad-key" onclick="nifPress('7')">7</button>
                    <button class="numpad-key" onclick="nifPress('8')">8</button>
                    <button class="numpad-key" onclick="nifPress('9')">9</button>
                    <button class="numpad-key numpad-clear" onclick="nifClear()"><i class="fas fa-xmark"></i></button>
                    <button class="numpad-key" onclick="nifPress('0')">0</button>
                    <button class="numpad-key numpad-back" onclick="nifBackspace()"><i class="fas fa-delete-left"></i></button>
                </div>

            </div>
        </section>

        <!-- STEP 2: Item selection -->
        <section class="kiosk-step-panel" id="step-2" style="display:none">
            <h2 class="kiosk-title">Escolha o item</h2>
            <p class="kiosk-subtitle" id="step2-subtitle"></p>

            <div class="kiosk-search-bar">
                <i class="fas fa-magnifying-glass"></i>
                <input type="text" id="item-search" placeholder="Filtrar itens..." oninput="filterItems()" autocomplete="off">
                <button id="search-clear-btn" class="search-clear-btn" onclick="clearSearch()" style="display:none;" title="Limpar busca"><i class="fas fa-xmark"></i></button>
            </div>

            <div class="kiosk-items-grid" id="items-grid">
                <div class="kiosk-loading"><i class="fas fa-spinner fa-spin"></i> Carregando...</div>
            </div>

            <div class="kiosk-qty-bar" id="qty-bar" style="display:none">
                <span class="qty-item-name" id="qty-item-name"></span>
                <div class="qty-controls">
                    <button class="qty-btn" onclick="changeQty(-1)"><i class="fas fa-minus"></i></button>
                    <span class="qty-value" id="qty-value">1</span>
                    <button class="qty-btn" onclick="changeQty(1)"><i class="fas fa-plus"></i></button>
                </div>
                <button class="kiosk-btn-primary" onclick="goToStep3()">
                    Confirmar <i class="fas fa-arrow-right"></i>
                </button>
            </div>

            <button class="kiosk-btn-ghost" onclick="goToStep1()">
                <i class="fas fa-arrow-left"></i> Voltar
            </button>
        </section>

        <!-- STEP 3: Confirmation -->
        <section class="kiosk-step-panel" id="step-3" style="display:none">
            <h2 class="kiosk-title">Confirmar Retirada</h2>

            <div class="kiosk-summary-card">
                <div class="summary-row">
                    <span class="summary-label"><i class="fas fa-user"></i> Titular</span>
                    <span class="summary-value" id="confirm-name"></span>
                </div>
                <div class="summary-row">
                    <span class="summary-label"><i class="fas fa-id-card"></i> NIF</span>
                    <span class="summary-value" id="confirm-nif"></span>
                </div>
                <div class="summary-row">
                    <span class="summary-label"><i class="fas fa-box"></i> Item</span>
                    <span class="summary-value" id="confirm-item"></span>
                </div>
                <div class="summary-row">
                    <span class="summary-label"><i class="fas fa-hashtag"></i> Quantidade</span>
                    <span class="summary-value" id="confirm-qty"></span>
                </div>
            </div>

            <div class="kiosk-confirm-actions">
                <button class="kiosk-btn-ghost" onclick="goToStep2()">
                    <i class="fas fa-arrow-left"></i> Alterar
                </button>
                <button class="kiosk-btn-primary kiosk-btn-large" id="confirm-btn" onclick="submitWithdraw()">
                    <i class="fas fa-check-circle"></i> Confirmar Retirada
                </button>
            </div>
        </section>

        <!-- SUCCESS SCREEN -->
        <section class="kiosk-step-panel kiosk-success" id="step-success" style="display:none">
            <div class="success-icon"><i class="fas fa-circle-check"></i></div>
            <h2 class="kiosk-title">Retirada Registada!</h2>
            <p class="kiosk-subtitle" id="success-msg"></p>
            <button class="kiosk-btn-primary kiosk-btn-large" onclick="resetKiosk()" style="margin-top:32px;">
                <i class="fas fa-rotate-right"></i> Nova Retirada
            </button>
        </section>

    </main>

    <div id="toast" class="toast"></div>
    <script src="js/config.js"></script>
    <script src="js/withdraw.js"></script>
</body>
</html>
